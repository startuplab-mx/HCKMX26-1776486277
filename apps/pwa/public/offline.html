<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1220" />
    <title>Sin conexión</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1220;
        --fg: #e7eefc;
        --muted: #9db0d0;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--fg);
        font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        padding: 24px;
      }
      main {
        max-width: 44ch;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 8px;
      }
      p {
        margin: 0;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>No hay conexión a Internet</h1>
      <p>Cuando vuelva la red, la app se sincronizará automáticamente.</p>
    </main>
  </body>
</html>
